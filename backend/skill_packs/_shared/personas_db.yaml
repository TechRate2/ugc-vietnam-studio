# ============================================
# CASTING SCORING WEIGHTS
# Casting Director dùng để rank candidates
# ============================================

casting_weights:
  niche_tag_match: 0.40       # avatar có niche_tag match niche từ skill pack
  vibe_match: 0.25            # vibe match cinematic mood
  voice_gender_match: 0.15    # match preferred_gender skill pack
  age_match: 0.15             # overlap age range với target audience
  personality_fit: 0.05       # personality match Director's tone


# ============================================
# VIBE COMPATIBILITY MATRIX
# Maps cinematic mood → avatar vibes phù hợp
# ============================================

mood_to_vibes:
  energetic: ["gen_z_casual", "tech_nerd", "foodie_aesthetic"]
  dreamy: ["kbeauty_inspired", "beauty_blogger", "millennial_warm"]
  authentic-raw: ["gen_z_casual", "mom_lifestyle", "lifestyle_aspirational"]
  luxury: ["professional", "expert", "career_woman"]
  playful: ["gen_z_casual", "tech_nerd", "foodie_aesthetic"]
  nostalgic: ["millennial_warm", "lifestyle_clean"]


# ============================================
# EXPANSION NOTES
# ============================================
# Tổng cộng 10 avatar mẫu trên = template schema.
# Anh có 50 avatar VN trong backend/api/routes/avatars.py — extend file này
# bằng cách add metadata mỗi avatar theo schema trên.
#
# Tools để bulk-generate metadata:
#   1. Tải 50 ảnh avatar
#   2. Dùng Qwen3-VL phân tích từng ảnh → output age/gender/vibe/features
#   3. Manual edit niche_tags + voice_id mapping
#
# Background script (chunk 3): scripts/extract_avatar_metadata.py sẽ tự động bước này.
